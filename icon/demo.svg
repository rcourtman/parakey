<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="-apple-system, system-ui, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif">
  <title>Hold Right Option, speak, release — the sentence lands at your cursor about 100 ms later.</title>

  <!-- Timeline (6.5 s loop): idle 0.5 s · press · speak 2.4 s · release at 2.9 s ·
       text lands at 3.0 s (a real ~100 ms after release) · rest ~3.2 s · reset -->

  <!-- Background -->
  <rect width="1000" height="500" fill="#FAF8F2"/>

  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>

    <!-- Left-to-right reveal of the live caption while "speaking" -->
    <clipPath id="captionClip">
      <rect x="446" y="344" width="0" height="36">
        <animate attributeName="width" values="0;0;292;292" keyTimes="0;0.10;0.43;1" dur="6.5s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- ====================================================== -->
  <!-- The document window — where the transcript will land   -->
  <!-- ====================================================== -->
  <g filter="url(#soft)">
    <rect x="150" y="48" width="700" height="230" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <!-- Traffic lights + title -->
  <circle cx="178" cy="68" r="6" fill="#FF5F57"/>
  <circle cx="200" cy="68" r="6" fill="#FEBC2E"/>
  <circle cx="222" cy="68" r="6" fill="#28C840"/>
  <text x="500" y="73" text-anchor="middle" font-size="13" font-weight="500" fill="#94A3B8">Anywhere you can type</text>
  <line x1="151" y1="88" x2="849" y2="88" stroke="#F1F5F9" stroke-width="1.5"/>

  <!-- Existing note content -->
  <text x="190" y="126" font-size="16" font-weight="600" fill="#0F172A">Friday standup</text>
  <text x="190" y="158" font-size="15" fill="#64748B">·  demo the new build</text>
  <text x="190" y="190" font-size="15" fill="#64748B">·</text>

  <!-- Paste flash behind the landing line -->
  <rect x="200" y="173" width="292" height="24" rx="4" fill="#10B981" opacity="0">
    <animate attributeName="opacity" values="0;0;0.25;0;0" keyTimes="0;0.4615;0.475;0.53;1" dur="6.5s" repeatCount="indefinite"/>
  </rect>

  <!-- The transcript: appears all at once ~100 ms after release -->
  <text x="204" y="190" font-size="16" font-weight="500" fill="#0F172A" textLength="280" fill-opacity="0">
    <animate attributeName="fill-opacity" values="0;0;1;1;0;0" keyTimes="0;0.4608;0.4662;0.95;0.99;1" dur="6.5s" repeatCount="indefinite"/>
    This sentence was spoken, not typed.
  </text>

  <!-- Caret before the paste (start of the empty bullet) -->
  <g opacity="1">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.4608;0.4615;1" dur="6.5s" repeatCount="indefinite"/>
    <rect x="204" y="174" width="2" height="21" fill="#0F172A">
      <animate attributeName="fill-opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Caret after the paste (end of the sentence) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.4608;0.4615;0.95;0.99;1" dur="6.5s" repeatCount="indefinite"/>
    <rect x="488" y="174" width="2" height="21" fill="#0F172A">
      <animate attributeName="fill-opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- "~100 ms" chip: pops the moment the text lands -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.4615;0.467;0.95;0.99;1" dur="6.5s" repeatCount="indefinite"/>
    <rect x="506" y="170" width="96" height="28" rx="14" fill="#10B981"/>
    <text x="554" y="189" text-anchor="middle" font-size="13.5" font-weight="700" fill="#FFFFFF">~100 ms</text>
  </g>

  <!-- ====================================================== -->
  <!-- The keycap — pressed for the whole speak phase          -->
  <!-- ====================================================== -->
  <!-- Base (the dark lip the cap sinks into) -->
  <rect x="240" y="336" width="64" height="62" rx="12" fill="#CBD5E1"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 0;0 5;0 5;0 0;0 0" keyTimes="0;0.077;0.082;0.446;0.452;1" dur="6.5s" repeatCount="indefinite"/>
    <rect x="240" y="330" width="64" height="62" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5">
      <animate attributeName="fill" values="#FFFFFF;#FFFFFF;#10B981;#10B981;#FFFFFF;#FFFFFF" keyTimes="0;0.077;0.082;0.446;0.452;1" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#CBD5E1;#CBD5E1;#0DA271;#0DA271;#CBD5E1;#CBD5E1" keyTimes="0;0.077;0.082;0.446;0.452;1" dur="6.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Option symbol, drawn as paths so it renders on every platform -->
    <g fill="none" stroke="#334155" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
      <animate attributeName="stroke" values="#334155;#334155;#FFFFFF;#FFFFFF;#334155;#334155" keyTimes="0;0.077;0.082;0.446;0.452;1" dur="6.5s" repeatCount="indefinite"/>
      <path d="M 259 352.5 h 7 l 12 17 h 7"/>
      <path d="M 278 352.5 h 7"/>
    </g>
  </g>
  <text x="272" y="420" text-anchor="middle" font-size="12" font-weight="500" fill="#94A3B8">Hold Right Option</text>

  <!-- ====================================================== -->
  <!-- The dictation HUD — appears while the key is held       -->
  <!-- ====================================================== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.077;0.092;0.45;0.49;1" dur="6.5s" repeatCount="indefinite"/>
    <g filter="url(#soft)">
      <rect x="320" y="334" width="440" height="56" rx="28" fill="#0F172A"/>
    </g>
    <!-- Mic dot -->
    <circle cx="348" cy="362" r="5" fill="#10B981">
      <animate attributeName="r" values="4.5;6;4.5" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Live waveform -->
    <g fill="#10B981">
      <g transform="translate(368 362)"><rect x="-2.5" y="-11" width="5" height="22" rx="2.5">
        <animateTransform attributeName="transform" type="scale" values="1 0.35;1 0.95;1 0.45;1 0.75;1 0.35" dur="0.8s" repeatCount="indefinite"/></rect></g>
      <g transform="translate(380 362)"><rect x="-2.5" y="-11" width="5" height="22" rx="2.5">
        <animateTransform attributeName="transform" type="scale" values="1 0.5;1 1;1 0.4;1 0.9;1 0.5" dur="0.95s" begin="-0.2s" repeatCount="indefinite"/></rect></g>
      <g transform="translate(392 362)"><rect x="-2.5" y="-11" width="5" height="22" rx="2.5">
        <animateTransform attributeName="transform" type="scale" values="1 0.3;1 0.8;1 1;1 0.5;1 0.3" dur="1.1s" begin="-0.5s" repeatCount="indefinite"/></rect></g>
      <g transform="translate(404 362)"><rect x="-2.5" y="-11" width="5" height="22" rx="2.5">
        <animateTransform attributeName="transform" type="scale" values="1 0.6;1 0.35;1 0.95;1 0.55;1 0.6" dur="0.85s" begin="-0.35s" repeatCount="indefinite"/></rect></g>
      <g transform="translate(416 362)"><rect x="-2.5" y="-11" width="5" height="22" rx="2.5">
        <animateTransform attributeName="transform" type="scale" values="1 0.4;1 0.9;1 0.5;1 1;1 0.4" dur="1.0s" begin="-0.65s" repeatCount="indefinite"/></rect></g>
      <g transform="translate(428 362)"><rect x="-2.5" y="-11" width="5" height="22" rx="2.5">
        <animateTransform attributeName="transform" type="scale" values="1 0.35;1 0.7;1 0.45;1 0.85;1 0.35" dur="0.9s" begin="-0.15s" repeatCount="indefinite"/></rect></g>
    </g>
    <!-- Live caption of what's being said -->
    <g clip-path="url(#captionClip)">
      <text x="448" y="368" font-size="15" font-style="italic" fill="#E2E8F0" textLength="285">“This sentence was spoken, not typed.”</text>
    </g>
  </g>

  <!-- ====================================================== -->
  <!-- Phase captions — each benefit lands when it's relevant  -->
  <!-- ====================================================== -->
  <!-- While speaking: privacy. Slashed cloud + on-device line -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.092;0.115;0.45;0.48;1" dur="6.5s" repeatCount="indefinite"/>
    <g transform="translate(230 461)">
      <g fill="#CBD5E1">
        <circle cx="7" cy="10" r="5"/>
        <circle cx="13" cy="7" r="6.5"/>
        <circle cx="19" cy="10" r="5"/>
        <rect x="4" y="9" width="18" height="6" rx="3"/>
      </g>
      <!-- Slash with a background-colored casing so it reads as a cut -->
      <line x1="1" y1="17" x2="25" y2="-1" stroke="#FAF8F2" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="1" y1="17" x2="25" y2="-1" stroke="#64748B" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="270" y="471" font-size="14" fill="#64748B" textLength="480">Your voice never leaves this Mac — transcribed on the Apple Neural Engine.</text>
  </g>

  <!-- After the paste: featherweight stats -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.52;0.55;0.95;0.99;1" dur="6.5s" repeatCount="indefinite"/>
    <rect x="306" y="456" width="150" height="28" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="381" y="474" text-anchor="middle" font-size="13"><tspan font-weight="700" fill="#0E8A66">0% CPU</tspan><tspan fill="#64748B"> when idle</tspan></text>
    <rect x="468" y="456" width="110" height="28" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="523" y="474" text-anchor="middle" font-size="13"><tspan font-weight="700" fill="#0E8A66">~80 MB</tspan><tspan fill="#64748B"> RAM</tspan></text>
    <rect x="590" y="456" width="105" height="28" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="642" y="474" text-anchor="middle" font-size="13"><tspan font-weight="700" fill="#0E8A66">2.5 MB</tspan><tspan fill="#64748B"> app</tspan></text>
  </g>
</svg>
