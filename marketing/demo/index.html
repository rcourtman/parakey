<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Parakey demo</title>
    <style>
      :root {
        --text: #18201d;
        --text-dim: #6a766f;
        --line: #d9d4c7;
        --accent: #0d7f5f;
        --accent-bright: #10b981;
      }
      html, body { margin: 0; padding: 0; }
      body {
        width: 1920px;
        height: 1080px;
        font-family: -apple-system, system-ui, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
        color: var(--text);
        overflow: hidden;
        position: relative;
        background:
          linear-gradient(180deg, #ece3d2 0%, #d9cebb 55%, #c2b59c 100%);
      }

      /* ---------- Menu bar (static — no state changes here so the
                    viewer's eye isn't pulled to the corner) ---------- */
      .menubar {
        position: absolute; inset: 0 0 auto 0;
        height: 40px;
        display: flex; align-items: center;
        padding: 0 22px;
        font-size: 15px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(22px) saturate(170%);
        -webkit-backdrop-filter: blur(22px) saturate(170%);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }
      .menubar .group { display: flex; align-items: center; gap: 20px; }
      .menubar .app   { font-weight: 700; letter-spacing: -0.005em; }
      .menubar .spacer { flex: 1; }
      .menubar .right { gap: 16px; }
      .menubar .icon { display: inline-flex; color: #18201d; opacity: 0.85; }
      .menubar .icon svg { display: block; }
      .menubar .clock {
        font-variant-numeric: tabular-nums;
        font-weight: 500;
      }
      .parakey-mb {
        width: 26px; height: 26px;
        border-radius: 6px;
        display: grid; place-items: center;
        color: #18201d;
      }
      .parakey-mb svg { width: 16px; height: 16px; }

      /* ---------- Editor window ---------- */
      .editor {
        position: absolute;
        left: 50%;
        top: 110px;
        transform: translateX(-50%);
        width: 1240px;
        height: 700px;
        background: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.5) inset,
          0 0 0 1px rgba(0, 0, 0, 0.07),
          0 4px 12px rgba(0, 0, 0, 0.06),
          0 32px 80px rgba(0, 0, 0, 0.22);
      }
      .titlebar {
        height: 44px;
        background: linear-gradient(180deg, #f6f5ef 0%, #ecebe3 100%);
        border-bottom: 1px solid rgba(0, 0, 0, 0.07);
        display: flex; align-items: center;
        padding: 0 18px;
        position: relative;
      }
      .traffic { display: flex; gap: 8px; }
      .traffic span {
        width: 12px; height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.18);
      }
      .traffic .r { background: #ff5f57; }
      .traffic .y { background: #febc2e; }
      .traffic .g { background: #28c840; }
      .window-title {
        position: absolute; left: 50%; transform: translateX(-50%);
        font-size: 14px;
        color: #565550;
        font-weight: 500;
      }
      .doc {
        height: calc(100% - 44px);
        padding: 88px 110px;
        box-sizing: border-box;
        position: relative;
      }
      .doc-line {
        margin: 0;
        font-size: 50px;
        line-height: 1.4;
        color: #18201d;
        letter-spacing: -0.012em;
        font-weight: 400;
        white-space: pre-wrap;
        word-break: normal;
        overflow-wrap: break-word;
      }
      .cursor {
        display: inline-block;
        width: 3px;
        height: 56px;
        background: #18201d;
        vertical-align: -14px;
        margin-left: 2px;
        border-radius: 1px;
      }

      /* ---------- HUD chip — the single, focal status indicator.
         Everything that used to be scattered (popover, terminal log,
         keyboard widget) is collapsed here, directly below the editor,
         in the same vertical column as the cursor. ---------- */
      .hud {
        position: absolute;
        left: 50%;
        top: 840px;
        transform: translate(-50%, 0);
        display: flex;
        align-items: center;
        gap: 22px;
        padding: 16px 22px;
        min-width: 600px;
        background: #ffffff;
        border-radius: 14px;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.06),
          0 18px 50px rgba(0, 0, 0, 0.18);
        will-change: opacity, transform;
      }
      .hud-key {
        width: 60px;
        height: 60px;
        border-radius: 10px;
        background: #fdfcf8;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
        display: grid;
        place-items: center;
        position: relative;
        flex: 0 0 60px;
      }
      .hud-key .glyph {
        font-size: 26px;
        color: #18201d;
        font-weight: 500;
        line-height: 1;
        margin-top: -8px;
      }
      .hud-key .lbl {
        position: absolute;
        bottom: 7px;
        font-size: 9px;
        color: #8a948e;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .hud-key.pressed {
        background: #d6efe3;
        border-color: rgba(13, 127, 95, 0.45);
        box-shadow:
          0 0 0 2px rgba(13, 127, 95, 0.18),
          0 0 16px rgba(16, 185, 129, 0.30);
        transform: translateY(2px);
      }
      .hud-key.pressed .glyph { color: #075941; }
      .hud-key.pressed .lbl   { color: #1a8a64; }

      .hud-wave {
        flex: 0 0 240px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .hud-wave span {
        flex: 0 0 9px;
        width: 9px;
        background: linear-gradient(180deg, #12a87c 0%, #0d7f5f 100%);
        border-radius: 4px;
        height: 16%;
      }

      .hud-label {
        flex: 0 0 auto;
        display: flex;
        align-items: baseline;
        gap: 10px;
        min-width: 260px;
        font-size: 28px;
        font-weight: 500;
        letter-spacing: -0.01em;
        color: #18201d;
      }
      .hud-label .state { color: #18201d; font-weight: 600; }
      .hud-label .timer {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-feature-settings: "ss01", "cv11";
        font-variant-numeric: tabular-nums;
        font-size: 24px;
        color: var(--text-dim);
        font-weight: 500;
      }
      .hud-label.done .state {
        color: var(--accent);
        font-weight: 700;
      }
      .hud-label .check {
        display: none;
        place-items: center;
        width: 26px; height: 26px;
        border-radius: 50%;
        background: var(--accent);
        color: white;
        font-size: 14px;
        font-weight: 800;
        margin-right: 4px;
        transform: translateY(2px);
        will-change: transform, opacity;
      }
      .hud-label.done .check {
        display: inline-grid;
      }

      /* ---------- End caption (main + lightweight subtitle) ---------- */
      .caption {
        position: absolute;
        left: 0; right: 0;
        bottom: 60px;
        text-align: center;
      }
      .caption .main,
      .caption .sub {
        will-change: opacity, transform;
      }
      .caption .main {
        font-size: 42px;
        color: #18201d;
        font-weight: 600;
        letter-spacing: -0.015em;
      }
      .caption .main .dim { color: #5d6a64; font-weight: 400; }
      .caption .sub {
        margin-top: 10px;
        font-size: 22px;
        color: #6a766f;
        font-weight: 500;
        letter-spacing: 0;
        font-variant-numeric: tabular-nums;
      }
      .caption .sub .accent { color: var(--accent); font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="menubar">
      <div class="group">
        <span class="app">TextEdit</span>
        <span>File</span>
        <span>Edit</span>
        <span>Format</span>
        <span>View</span>
        <span>Window</span>
        <span>Help</span>
      </div>
      <span class="spacer"></span>
      <div class="group right">
        <span class="icon" aria-hidden="true">
          <svg width="26" height="13" viewBox="0 0 28 14" fill="none">
            <rect x="0.7" y="0.7" width="22.6" height="12.6" rx="2.6" stroke="currentColor" stroke-width="1.1"/>
            <rect x="2.4" y="2.4" width="15.5" height="9.2" rx="1.2" fill="currentColor"/>
            <rect x="24" y="4.6" width="1.6" height="4.8" rx="0.7" fill="currentColor"/>
          </svg>
        </span>
        <span class="icon" aria-hidden="true">
          <svg width="20" height="16" viewBox="0 0 22 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
            <path d="M2 6 Q11 -2 20 6"/>
            <path d="M5 9.5 Q11 4 17 9.5"/>
            <path d="M8 13 Q11 10.5 14 13"/>
            <circle cx="11" cy="16" r="1.2" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <span class="parakey-mb" aria-hidden="true">
          <svg viewBox="0 0 100 100" fill="currentColor">
            <rect x="35" y="10" width="30" height="55" rx="15"/>
            <rect x="48.5" y="65" width="3" height="15"/>
            <rect x="22" y="80" width="56" height="6" rx="3"/>
          </svg>
        </span>
        <span class="clock">9:41</span>
      </div>
    </div>

    <div class="editor">
      <div class="titlebar">
        <div class="traffic"><span class="r"></span><span class="y"></span><span class="g"></span></div>
        <div class="window-title">Untitled.txt</div>
      </div>
      <div class="doc">
        <p class="doc-line"><span class="text" id="docText"></span><span class="cursor" id="cursor"></span></p>
      </div>
    </div>

    <div class="hud" id="hud" style="opacity:0; transform: translate(-50%, 8px);">
      <div class="hud-key" id="hudKey">
        <span class="glyph">⌥</span>
        <span class="lbl">option</span>
      </div>
      <div class="hud-wave" id="hudWave">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="hud-label" id="hudLabel">
        <span class="state">Hold Right Option</span>
        <span class="timer" id="hudTimer"></span>
      </div>
    </div>

    <div class="caption" id="caption">
      <div class="main" id="captionMain" style="opacity:0; transform: translateY(14px);">Local on-device dictation. <span class="dim">No cloud transcription.</span></div>
      <div class="sub" id="captionSub" style="opacity:0; transform: translateY(14px);"><span class="accent">2.2 MB</span> download &middot; <span class="accent">~80 MB</span> RAM idle &middot; <span class="accent">~94 ms</span> end-to-end</div>
    </div>

    <script>
      const FULL_TEXT = "Parakey is a local push-to-talk dictation app for Apple Silicon Macs.";

      // 14-second deterministic timeline. The 94 ms gap matches the
      // published p50.
      const TL = {
        hudIn:          0.40,  // chip spring-entrance begins
        hudInEnd:       0.85,  // chip fully settled
        keyDown:        1.05,  // key depresses, "Listening" begins
        recordingEnd:   6.05,  // KEY UP — waveform freezes
        textAppear:     6.144, // PASTE — 94 ms after release
        textRevealEnd:  6.314, // 170 ms snap-in fade
        badgePop:       6.144, // ✓ badge spring-in (same moment as paste)
        badgePopEnd:    6.49,
        hudOut:         8.10,  // chip exit begins
        hudGone:        8.42,
        captionMainIn:  9.50,
        captionMainEnd: 9.83,
        captionSubIn:   9.66,
        captionSubEnd:  10.02,
        end:           14.0,
      };

      const docText     = document.getElementById('docText');
      const docLine     = document.querySelector('.doc-line');
      const cursor      = document.getElementById('cursor');
      const hud         = document.getElementById('hud');
      const hudKey      = document.getElementById('hudKey');
      const hudLabel    = document.getElementById('hudLabel');
      const hudTimer    = document.getElementById('hudTimer');
      const captionMain = document.getElementById('captionMain');
      const captionSub  = document.getElementById('captionSub');
      const bars        = document.querySelectorAll('#hudWave span');

      docLine.style.transformOrigin = '0% 0%';

      // Pre-create the ✓ badge once so it can be animated independently
      // each frame instead of being created/removed (which would defeat
      // the deterministic per-frame render).
      const hudCheck = document.createElement('span');
      hudCheck.className = 'check';
      hudCheck.textContent = '✓';
      hudLabel.insertBefore(hudCheck, hudLabel.firstChild);

      function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
      function easeOutQuad(p)   { return 1 - Math.pow(1 - clamp(p, 0, 1), 2); }
      function easeOutCubic(p)  { return 1 - Math.pow(1 - clamp(p, 0, 1), 3); }
      function easeInOut(p)     { p = clamp(p, 0, 1); return p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2; }
      // Spring-overshoot ease — settles past 1.0 then back. Good for
      // entrances that should feel "alive" without bouncing forever.
      function easeOutBack(p, k) {
        p = clamp(p, 0, 1);
        const c1 = k == null ? 1.7 : k;
        const c3 = c1 + 1;
        return 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2);
      }

      function setWaveform(t, intensity, freeze) {
        // Deterministic per-bar sine mixture. `freeze` collapses the
        // bars to a uniform low height once the key is released and
        // again after the paste, so the line goes calm in step with
        // the rest of the story.
        for (let i = 0; i < bars.length; i++) {
          let finalH;
          if (freeze >= 1) {
            finalH = 0.16;
          } else {
            const phase = i * 0.55;
            const v =
                0.50
              + 0.30 * Math.sin(t * 6.4 + phase)
              + 0.22 * Math.sin(t * 3.1 + i * 0.9)
              + 0.10 * Math.sin(t * 11.7 + phase * 0.7);
            const h = clamp(v, 0.06, 0.96) * intensity;
            const liveH = 0.14 + 0.82 * h;
            finalH = liveH * (1 - freeze) + 0.16 * freeze;
          }
          bars[i].style.height = (clamp(finalH, 0.08, 1) * 100) + '%';
        }
      }

      function renderAt(t) {
        // ----- Cursor blink (frozen ON briefly during the paste so
        //       the eye doesn't catch a flicker right as text lands).
        let blinkOn;
        if (t >= TL.textAppear && t < TL.textRevealEnd + 0.4) {
          blinkOn = 1;
        } else {
          blinkOn = ((t * 1.88) % 1) < 0.55 ? 1 : 0;
        }
        cursor.style.opacity = blinkOn;

        // ----- HUD visibility — spring entrance + slide-down exit.
        // Entrance: opacity fades while scale + translateY overshoot in
        // (a back-ease, so the chip settles past 1.0 then to 1.0).
        // Exit: faster, scales down slightly and slides away.
        let hudOpacity = 0, hudScale = 0.94, hudTy = 22;
        if (t < TL.hudIn) {
          hudOpacity = 0; hudScale = 0.94; hudTy = 22;
        } else if (t < TL.hudInEnd) {
          const p = (t - TL.hudIn) / (TL.hudInEnd - TL.hudIn);
          const back = easeOutBack(p, 1.6);
          const fade = easeOutCubic(p);
          hudOpacity = fade;
          hudScale = 0.94 + back * 0.06;
          hudTy = (1 - back) * 22;
        } else if (t < TL.hudOut) {
          hudOpacity = 1; hudScale = 1; hudTy = 0;
        } else if (t < TL.hudGone) {
          const p = (t - TL.hudOut) / (TL.hudGone - TL.hudOut);
          const eased = easeOutQuad(p);
          hudOpacity = 1 - eased;
          hudScale = 1 - eased * 0.04;
          hudTy = eased * 16;
        } else {
          hudOpacity = 0; hudScale = 0.96; hudTy = 16;
        }
        hud.style.opacity = hudOpacity;
        hud.style.transform =
          'translate(-50%, ' + hudTy + 'px) scale(' + hudScale + ')';

        // ----- Keycap state (pressed only while the hotkey is held).
        if (t >= TL.keyDown && t < TL.recordingEnd) {
          hudKey.classList.add('pressed');
        } else {
          hudKey.classList.remove('pressed');
        }

        // ----- Waveform envelope.
        let intensity, freeze;
        if (t < TL.keyDown) {
          intensity = 0; freeze = 1;
        } else if (t < TL.keyDown + 0.22) {
          // Ramp up over ~220ms so the meter doesn't snap to full from
          // a flat baseline — feels like the mic spinning up.
          const ramp = (t - TL.keyDown) / 0.22;
          intensity = ramp; freeze = 1 - ramp;
        } else if (t < TL.recordingEnd) {
          intensity = 1; freeze = 0;
        } else {
          // Key released — bars freeze the instant the key lifts.
          intensity = 0; freeze = 1;
        }
        setWaveform(t, intensity, freeze);

        // ----- HUD label — the single status string tracks the story.
        //   t < keyDown:        "Hold Right Option"
        //   keyDown..recording: "Listening" + live elapsed counter
        //   recording..paste:   "Listening" frozen at audio length
        //   paste..hudOut:      "✓ pasted in 94 ms"  (badge springs in)
        const labelState = hudLabel.querySelector('.state');
        if (t < TL.keyDown) {
          hudLabel.classList.remove('done');
          labelState.textContent = 'Hold Right Option';
          hudTimer.textContent = '';
        } else if (t < TL.textAppear) {
          hudLabel.classList.remove('done');
          labelState.textContent = 'Listening';
          const elapsed = Math.min(t, TL.recordingEnd) - TL.keyDown;
          hudTimer.textContent = elapsed.toFixed(1) + 's';
        } else {
          hudLabel.classList.add('done');
          labelState.textContent = 'pasted in 94 ms';
          hudTimer.textContent = '';
        }

        // ----- ✓ badge pop on paste. Starts at scale 0, springs past
        // 1 with a back-ease, settles at 1. Opacity fades in over the
        // first half of the animation so we don't see a tiny dot.
        if (t < TL.badgePop) {
          hudCheck.style.opacity = 0;
          hudCheck.style.transform = 'translateY(2px) scale(0)';
        } else if (t < TL.badgePopEnd) {
          const p = (t - TL.badgePop) / (TL.badgePopEnd - TL.badgePop);
          const back = easeOutBack(p, 2.4);
          hudCheck.style.opacity = clamp(p * 2, 0, 1);
          hudCheck.style.transform = 'translateY(2px) scale(' + back + ')';
        } else {
          hudCheck.style.opacity = 1;
          hudCheck.style.transform = 'translateY(2px) scale(1)';
        }

        // ----- Pasted text snap-in.
        if (t >= TL.textAppear) {
          docText.textContent = FULL_TEXT;
          const p = clamp((t - TL.textAppear) / (TL.textRevealEnd - TL.textAppear), 0, 1);
          const eased = easeOutQuad(p);
          docText.style.opacity = eased;
          docLine.style.transform = 'scale(' + (0.985 + 0.015 * eased) + ')';
        } else {
          docText.textContent = '';
          docText.style.opacity = 0;
          docLine.style.transform = 'scale(1)';
        }

        // ----- Caption — main line and subtitle slide up + fade,
        // staggered so the eye reads them as two beats, not one.
        function captionReveal(el, start, end) {
          let p;
          if      (t < start) p = 0;
          else if (t < end)   p = easeOutCubic((t - start) / (end - start));
          else                p = 1;
          el.style.opacity = p;
          el.style.transform = 'translateY(' + ((1 - p) * 14) + 'px)';
        }
        captionReveal(captionMain, TL.captionMainIn, TL.captionMainEnd);
        captionReveal(captionSub,  TL.captionSubIn,  TL.captionSubEnd);
      }

      renderAt(0);
      window.renderAt = renderAt;
      window.demoReady = true;
    </script>
  </body>
</html>
