<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Parakey demo</title>
    <style>
      :root {
        --text: #18201d;
        --text-dim: #6a766f;
        --line: #d9d4c7;
        --accent: #0d7f5f;
        --accent-bright: #10b981;
        --rec: #e0334a; /* matches macOS systemRed, which is what the
                          real app uses for the recording menubar state */
      }
      html, body { margin: 0; padding: 0; }
      body {
        width: 1920px;
        height: 1080px;
        font-family: -apple-system, system-ui, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
        color: var(--text);
        overflow: hidden;
        position: relative;
        background:
          linear-gradient(180deg, #ece3d2 0%, #d9cebb 55%, #c2b59c 100%);
      }

      /* Virtual camera: the .scene wrapper is what the camera zooms /
         pans. Title card and end caption live outside it so they stay
         fixed to the viewport. Transform-origin (0,0) means the JS
         can compute translate + scale directly without worrying about
         CSS's center-relative default. */
      .scene {
        position: absolute;
        inset: 0;
        transform-origin: 0 0;
        will-change: transform;
      }

      /* ---------- Beat 1: title card overlay.
         Full-screen cover that fades in at the start, holds, then
         fades out to reveal the workflow scene beneath. ---------- */
      .title {
        position: absolute;
        inset: 0;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: linear-gradient(180deg, #ece3d2 0%, #d9cebb 55%, #c2b59c 100%);
        will-change: opacity;
      }
      .title-icon {
        width: 180px;
        height: 180px;
        border-radius: 42px;
        background: var(--accent);
        display: grid;
        place-items: center;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.4) inset,
          0 18px 60px rgba(13, 127, 95, 0.25);
      }
      .title-icon svg {
        width: 100px;
        height: 100px;
        color: #ffffff;
      }
      .title-word {
        font-size: 96px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #18201d;
        line-height: 1;
      }
      .title-tag {
        font-size: 30px;
        font-weight: 500;
        letter-spacing: -0.005em;
        color: var(--text-dim);
        margin-top: 4px;
      }

      /* ---------- Menu bar ---------- */
      .menubar {
        position: absolute; inset: 0 0 auto 0;
        height: 40px;
        display: flex; align-items: center;
        padding: 0 22px;
        font-size: 15px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(22px) saturate(170%);
        -webkit-backdrop-filter: blur(22px) saturate(170%);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }
      .menubar .group { display: flex; align-items: center; gap: 20px; }
      .menubar .app   { font-weight: 700; letter-spacing: -0.005em; }
      .menubar .spacer { flex: 1; }
      .menubar .right { gap: 16px; }
      .menubar .icon { display: inline-flex; color: #18201d; opacity: 0.85; }
      .menubar .icon svg { display: block; }
      .menubar .clock {
        font-variant-numeric: tabular-nums;
        font-weight: 500;
      }
      /* Parakey menubar icon — black template by default, switches to
         the macOS-systemRed tint while the hotkey is held. Mirrors
         setMenuBarState(.recording) → button.contentTintColor =
         .systemRed in swift/Sources/Parakey/main.swift. */
      .parakey-mb {
        position: relative;
        width: 30px; height: 30px;
        border-radius: 7px;
        display: grid; place-items: center;
        color: #18201d;
      }
      .parakey-mb svg { width: 18px; height: 18px; transition: none; }
      .parakey-mb.recording { color: var(--rec); }

      /* ---------- Editor window ---------- */
      .editor {
        position: absolute;
        left: 50%;
        top: 110px;
        transform: translateX(-50%);
        width: 1240px;
        height: 700px;
        background: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.5) inset,
          0 0 0 1px rgba(0, 0, 0, 0.07),
          0 4px 12px rgba(0, 0, 0, 0.06),
          0 32px 80px rgba(0, 0, 0, 0.22);
      }
      .titlebar {
        height: 44px;
        background: linear-gradient(180deg, #f6f5ef 0%, #ecebe3 100%);
        border-bottom: 1px solid rgba(0, 0, 0, 0.07);
        display: flex; align-items: center;
        padding: 0 18px;
        position: relative;
      }
      .traffic { display: flex; gap: 8px; }
      .traffic span {
        width: 12px; height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.18);
      }
      .traffic .r { background: #ff5f57; }
      .traffic .y { background: #febc2e; }
      .traffic .g { background: #28c840; }
      .window-title {
        position: absolute; left: 50%; transform: translateX(-50%);
        font-size: 14px;
        color: #565550;
        font-weight: 500;
      }
      .doc {
        height: calc(100% - 44px);
        padding: 88px 110px;
        box-sizing: border-box;
        position: relative;
      }
      .doc-line {
        margin: 0;
        font-size: 50px;
        line-height: 1.4;
        color: #18201d;
        letter-spacing: -0.012em;
        font-weight: 400;
        white-space: pre-wrap;
        word-break: normal;
        overflow-wrap: break-word;
        position: relative;
      }
      .cursor {
        display: inline-block;
        width: 3px;
        height: 56px;
        background: #18201d;
        vertical-align: -14px;
        margin-left: 2px;
        border-radius: 1px;
      }

      /* ---------- Keypress visualisation + narration. ---------- */
      .stage {
        position: absolute;
        left: 50%;
        top: 852px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 42px;
        width: 760px;
      }
      /* A clearly-drawn keyboard cap. Sits in the desktop area (not
         inside any window), so it reads as input visualisation, not
         Parakey UI. Camera will zoom in on this cap at the press beat
         so a 120 px cap fills most of the frame. */
      .keycap {
        flex: 0 0 130px;
        width: 130px;
        height: 130px;
        border-radius: 14px;
        background: #fdfcf8;
        border: 1px solid rgba(0, 0, 0, 0.10);
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.10), 0 1px 0 rgba(255,255,255,0.6) inset;
        display: grid;
        place-items: center;
        position: relative;
        will-change: transform, box-shadow, background;
      }
      .keycap .glyph {
        font-size: 56px;
        color: #18201d;
        line-height: 1;
        font-weight: 500;
        margin-top: -16px;
      }
      .keycap .lbl {
        position: absolute;
        bottom: 14px;
        font-size: 13px;
        color: #8a948e;
        font-weight: 700;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      /* Press state — the cap actually moves down with a brief
         spring overshoot (handled in JS) and gains a subtle red
         shadow that's animated as a held-glow pulse. */
      .keycap.pressed {
        background: rgba(224, 51, 74, 0.10);
        border-color: rgba(224, 51, 74, 0.45);
      }
      .keycap.pressed .glyph { color: #962031; }
      .keycap.pressed .lbl   { color: #962031; }

      .narration {
        flex: 1;
        font-size: 26px;
        color: var(--text-dim);
        font-weight: 500;
        letter-spacing: -0.005em;
        font-variant-numeric: tabular-nums;
        text-align: left;
      }

      /* ---------- End caption (main + lightweight subtitle) ---------- */
      .caption {
        position: absolute;
        left: 0; right: 0;
        bottom: 56px;
        text-align: center;
      }
      .caption .main,
      .caption .sub {
        will-change: opacity, transform;
      }
      .caption .main {
        font-size: 42px;
        color: #18201d;
        font-weight: 600;
        letter-spacing: -0.015em;
      }
      .caption .main .dim { color: #5d6a64; font-weight: 400; }
      .caption .main .accent { color: var(--accent); font-weight: 700; }
      .caption .sub {
        margin-top: 10px;
        font-size: 22px;
        color: #6a766f;
        font-weight: 500;
        letter-spacing: 0;
        font-variant-numeric: tabular-nums;
      }
      .caption .sub .accent { color: var(--accent); font-weight: 700; }
    </style>
  </head>
  <body>
    <!-- Beat 1: title card. Fades in at t=0, fades out by ~2 s. -->
    <div class="title" id="titleCard">
      <div class="title-icon">
        <svg viewBox="0 0 100 100" fill="currentColor">
          <rect x="35" y="10" width="30" height="55" rx="15"/>
          <rect x="48.5" y="65" width="3" height="15"/>
          <rect x="22" y="80" width="56" height="6" rx="3"/>
        </svg>
      </div>
      <div class="title-word">Parakey</div>
      <div class="title-tag">Local push-to-talk dictation for Apple Silicon Macs</div>
    </div>

    <div class="scene" id="scene">
    <div class="menubar">
      <div class="group">
        <span class="app">TextEdit</span>
        <span>File</span>
        <span>Edit</span>
        <span>Format</span>
        <span>View</span>
        <span>Window</span>
        <span>Help</span>
      </div>
      <span class="spacer"></span>
      <div class="group right">
        <span class="icon" aria-hidden="true">
          <svg width="26" height="13" viewBox="0 0 28 14" fill="none">
            <rect x="0.7" y="0.7" width="22.6" height="12.6" rx="2.6" stroke="currentColor" stroke-width="1.1"/>
            <rect x="2.4" y="2.4" width="15.5" height="9.2" rx="1.2" fill="currentColor"/>
            <rect x="24" y="4.6" width="1.6" height="4.8" rx="0.7" fill="currentColor"/>
          </svg>
        </span>
        <span class="icon" aria-hidden="true">
          <svg width="20" height="16" viewBox="0 0 22 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
            <path d="M2 6 Q11 -2 20 6"/>
            <path d="M5 9.5 Q11 4 17 9.5"/>
            <path d="M8 13 Q11 10.5 14 13"/>
            <circle cx="11" cy="16" r="1.2" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <span class="parakey-mb" id="parakeyMb" aria-hidden="true">
          <svg viewBox="0 0 100 100" fill="currentColor">
            <rect x="35" y="10" width="30" height="55" rx="15"/>
            <rect x="48.5" y="65" width="3" height="15"/>
            <rect x="22" y="80" width="56" height="6" rx="3"/>
          </svg>
        </span>
        <span class="clock">9:41</span>
      </div>
    </div>

    <div class="editor">
      <div class="titlebar">
        <div class="traffic"><span class="r"></span><span class="y"></span><span class="g"></span></div>
        <div class="window-title">Untitled.txt</div>
      </div>
      <div class="doc">
        <p class="doc-line"><span class="text" id="docText"></span><span class="cursor" id="cursor"></span></p>
      </div>
    </div>

    <div class="stage" id="stage">
      <div class="keycap" id="keycap">
        <span class="glyph">⌥</span>
        <span class="lbl">right option</span>
      </div>
      <div class="narration" id="narration">Hold Right Option</div>
    </div>
    </div><!-- /.scene -->

    <div class="caption" id="caption">
      <div class="main" id="captionMain" style="opacity:0; transform: translateY(14px);">Local speech&#8209;to&#8209;text on the <span class="accent">Apple&nbsp;Neural&nbsp;Engine</span>.</div>
      <div class="sub" id="captionSub" style="opacity:0; transform: translateY(14px);"><span class="accent">Parakeet&nbsp;TDT&nbsp;v3</span> &middot; CoreML &middot; <span class="accent">~94&nbsp;ms</span> transcription &middot; 2.2&nbsp;MB &middot; ~80&nbsp;MB&nbsp;RAM</div>
    </div>

    <script>
      const FULL_TEXT = "Parakey is a local push-to-talk dictation app for Apple Silicon Macs.";

      // Beats:
      //  0.0 – 1.8 s   Title card ("Parakey — local push-to-talk…")
      //  1.8 – 2.7 s   Title fades out, scene fades in, narration reads
      //                "Hold Right Option"
      //  2.7 s         KEY DOWN. Keycap depresses. Menubar Parakey icon
      //                switches to systemRed; attention ring pulses
      //                once around it. Audio-input ripples begin.
      //  2.7 – 7.7 s   Recording. Live "Listening · x.xs" counter.
      //  7.7 s         KEY UP. Menubar icon returns to default. Ripples
      //                stop.
      //  7.794 s       Text pastes (94 ms after release).
      //  9.0 – 9.5 s   Stage (keycap + narration) fades out.
      //  9.5 – 10 s    End caption fades in with tech + lightweight stats.
      // 10.0 – 15.5 s  Hold final frame.
      const TL = {
        titleFullyIn:   0.30,
        titleHoldEnd:   1.70,
        titleGone:      2.10,

        keyDown:        2.70,
        recordingEnd:   7.70,
        textAppear:     7.794, // PASTE — 94 ms after release
        textRevealEnd:  7.964,

        stageOut:       9.00,
        stageGone:      9.45,
        captionMainIn:  9.50,
        captionMainEnd: 9.83,
        captionSubIn:   9.66,
        captionSubEnd:  10.02,
        end:           15.50,
      };

      const scene       = document.getElementById('scene');
      const titleCard   = document.getElementById('titleCard');
      const docText     = document.getElementById('docText');
      const docLine     = document.querySelector('.doc-line');
      const cursor      = document.getElementById('cursor');
      const stage       = document.getElementById('stage');
      const keycap      = document.getElementById('keycap');
      const narration   = document.getElementById('narration');
      const parakeyMb   = document.getElementById('parakeyMb');
      const captionMain = document.getElementById('captionMain');
      const captionSub  = document.getElementById('captionSub');

      docLine.style.transformOrigin = '0% 0%';

      // ---- Virtual camera --------------------------------------------
      // Three positions. The camera holds wide for context, zooms in
      // for the two beats the eye would otherwise miss (the menubar
      // icon flipping red, and the text snapping into the editor),
      // and pulls back to wide for the workflow + end card.
      const CAMERA = {
        full:    { s: 1.00, cx: 960,  cy: 540 },
        keycap:  { s: 1.85, cx: 770,  cy: 915 },   // close on the keycap
        menubar: { s: 1.80, cx: 1820, cy: 200 },   // close on the Parakey menubar icon
        editor:  { s: 1.20, cx: 960,  cy: 360 },
      };

      // Beat structure:
      //   2.30 – 2.65   full → keycap (camera moves to the keycap)
      //   2.65 – 3.50   hold on keycap; key depresses at 2.70 in close-up
      //   3.50 – 3.95   keycap → menubar (pan up to the menubar)
      //   3.95 – 4.80   hold on menubar; viewer sees the icon is now red
      //   4.80 – 5.30   menubar → full (pull back for the recording wide)
      //   5.30 – 7.50   hold wide; live counter ticks
      //   7.50 – 7.85   full → editor (move to editor just before paste)
      //   7.85 – 8.60   hold on editor; viewer reads the pasted text
      //   8.60 – 9.15   editor → full (pull back for end card)
      const CAMERA_TL = [
        { t: 0.00,  pos: 'full' },
        { t: 2.30,  pos: 'full' },
        { t: 2.65,  pos: 'keycap' },
        { t: 3.50,  pos: 'keycap' },
        { t: 3.95,  pos: 'menubar' },
        { t: 4.80,  pos: 'menubar' },
        { t: 5.30,  pos: 'full' },
        { t: 7.50,  pos: 'full' },
        { t: 7.85,  pos: 'editor' },
        { t: 8.60,  pos: 'editor' },
        { t: 9.15,  pos: 'full' },
        { t: 15.50, pos: 'full' },
      ];

      function getCamera(t) {
        let prev = CAMERA_TL[0];
        let next = CAMERA_TL[CAMERA_TL.length - 1];
        for (let i = 0; i < CAMERA_TL.length - 1; i++) {
          if (t >= CAMERA_TL[i].t && t < CAMERA_TL[i + 1].t) {
            prev = CAMERA_TL[i];
            next = CAMERA_TL[i + 1];
            break;
          }
        }
        const range = next.t - prev.t;
        const p = range === 0 ? 1 : (t - prev.t) / range;
        const eased = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
        const a = CAMERA[prev.pos];
        const b = CAMERA[next.pos];
        return {
          s:  a.s  + (b.s  - a.s)  * eased,
          cx: a.cx + (b.cx - a.cx) * eased,
          cy: a.cy + (b.cy - a.cy) * eased,
        };
      }

      function setCamera(t) {
        const cam = getCamera(t);
        // translate(tx, ty) scale(s) with transform-origin 0 0 maps
        // scene point (cx, cy) to viewport centre (960, 540).
        const tx = 960 - cam.cx * cam.s;
        const ty = 540 - cam.cy * cam.s;
        scene.style.transform =
          'translate(' + tx + 'px, ' + ty + 'px) scale(' + cam.s + ')';
      }

      function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
      function easeOutQuad(p)   { return 1 - Math.pow(1 - clamp(p, 0, 1), 2); }
      function easeOutCubic(p)  { return 1 - Math.pow(1 - clamp(p, 0, 1), 3); }
      function easeInOut(p)     { p = clamp(p, 0, 1); return p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2; }
      function easeOutBack(p, k) {
        p = clamp(p, 0, 1);
        const c1 = k == null ? 1.7 : k;
        const c3 = c1 + 1;
        return 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2);
      }

      function renderAt(t) {
        // ----- Virtual camera ------------------------------------
        setCamera(t);

        // ----- Beat 1: title card --------------------------------
        let titleOpacity;
        if (t < TL.titleFullyIn) {
          titleOpacity = easeOutCubic(t / TL.titleFullyIn);
        } else if (t < TL.titleHoldEnd) {
          titleOpacity = 1;
        } else if (t < TL.titleGone) {
          titleOpacity = 1 - easeOutQuad((t - TL.titleHoldEnd) / (TL.titleGone - TL.titleHoldEnd));
        } else {
          titleOpacity = 0;
        }
        titleCard.style.opacity = titleOpacity;
        // Hide entirely once gone so it never blocks anything.
        titleCard.style.pointerEvents = titleOpacity > 0 ? 'auto' : 'none';

        // ----- Cursor blink ---------------------------------------
        // Frozen ON briefly during paste so the eye doesn't catch a
        // flicker right as the text lands.
        let blinkOn;
        if (t >= TL.textAppear && t < TL.textRevealEnd + 0.4) {
          blinkOn = 1;
        } else {
          blinkOn = ((t * 1.88) % 1) < 0.55 ? 1 : 0;
        }
        cursor.style.opacity = blinkOn;

        // ----- Keycap + menubar state during the hotkey hold -----
        const isRecording = (t >= TL.keyDown && t < TL.recordingEnd);
        keycap.classList.toggle('pressed', isRecording);
        parakeyMb.classList.toggle('recording', isRecording);

        // Press animation — spring-overshoot depress on key-down,
        // pulsing red held-glow while the key stays down, snap back
        // on release. Done in JS so it stays deterministic frame to
        // frame.
        let kcDepress = 0;
        let kcShadow = '0 4px 0 rgba(0,0,0,0.10), 0 1px 0 rgba(255,255,255,0.6) inset';
        if (isRecording) {
          const pressT = t - TL.keyDown;
          if (pressT < 0.18) {
            // Overshoot from 0 → ~6px → settle at 4px over 180 ms.
            kcDepress = easeOutBack(pressT / 0.18, 2.0) * 4;
          } else {
            kcDepress = 4;
          }
          // Slow ~1.4 Hz pulse on the red held-glow so the cap reads
          // as "still held" rather than "static pressed".
          const pulse = 0.5 + 0.5 * Math.sin((t - TL.keyDown) * 8.8);
          const glow = 0.28 + 0.18 * pulse;
          kcShadow =
            '0 ' + (4 - kcDepress) + 'px 0 rgba(0,0,0,0.06), '
          + '0 0 0 2px rgba(224, 51, 74, 0.30), '
          + '0 0 26px rgba(224, 51, 74, ' + glow.toFixed(3) + ')';
        } else if (t < TL.keyDown) {
          // Idle — defaults already in CSS.
        } else {
          // Released — snap back over ~120 ms.
          const releaseT = t - TL.recordingEnd;
          if (releaseT < 0.12) {
            const p = 1 - easeOutQuad(releaseT / 0.12);
            kcDepress = 4 * p;
          }
        }
        keycap.style.transform = 'translateY(' + kcDepress + 'px)';
        keycap.style.boxShadow = kcShadow;

        // ----- Narration ------------------------------------------
        if (t < TL.keyDown) {
          narration.textContent = 'Hold Right Option';
        } else if (t < TL.textAppear) {
          const elapsed = Math.min(t, TL.recordingEnd) - TL.keyDown;
          narration.textContent = 'Listening · ' + elapsed.toFixed(1) + 's';
        } else {
          narration.textContent = 'Transcribed on-device';
        }

        // ----- Stage fade-out (hands the floor to the caption) ----
        let stageOpacity = 1;
        if (t < TL.stageOut) stageOpacity = 1;
        else if (t < TL.stageGone) stageOpacity = 1 - easeOutQuad((t - TL.stageOut) / (TL.stageGone - TL.stageOut));
        else stageOpacity = 0;
        stage.style.opacity = stageOpacity;

        // ----- Pasted text snap-in --------------------------------
        if (t >= TL.textAppear) {
          docText.textContent = FULL_TEXT;
          const p = clamp((t - TL.textAppear) / (TL.textRevealEnd - TL.textAppear), 0, 1);
          const eased = easeOutQuad(p);
          docText.style.opacity = eased;
          docLine.style.transform = 'scale(' + (0.985 + 0.015 * eased) + ')';
        } else {
          docText.textContent = '';
          docText.style.opacity = 0;
          docLine.style.transform = 'scale(1)';
        }

        // ----- Caption — main + subtitle slide up + fade, staggered.
        function captionReveal(el, start, end) {
          let p;
          if      (t < start) p = 0;
          else if (t < end)   p = easeOutCubic((t - start) / (end - start));
          else                p = 1;
          el.style.opacity = p;
          el.style.transform = 'translateY(' + ((1 - p) * 14) + 'px)';
        }
        captionReveal(captionMain, TL.captionMainIn, TL.captionMainEnd);
        captionReveal(captionSub,  TL.captionSubIn,  TL.captionSubEnd);
      }

      renderAt(0);
      window.renderAt = renderAt;
      window.demoReady = true;
    </script>
  </body>
</html>
