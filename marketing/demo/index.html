<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Parakey demo</title>
    <style>
      :root {
        --text: #18201d;
        --text-dim: #6a766f;
        --line: #d9d4c7;
        --accent: #0d7f5f;
        --accent-bright: #10b981;
      }
      html, body { margin: 0; padding: 0; }
      body {
        width: 1920px;
        height: 1080px;
        font-family: -apple-system, system-ui, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
        color: var(--text);
        overflow: hidden;
        position: relative;
        background:
          linear-gradient(180deg, #ece3d2 0%, #d9cebb 55%, #c2b59c 100%);
      }

      /* ---------- Menu bar (kept static — Parakey's real menubar icon
                    presence is enough; we don't fake any glow state
                    here because we don't know exactly what the real
                    app does and over-claiming on that is what got us
                    in trouble before.) ---------- */
      .menubar {
        position: absolute; inset: 0 0 auto 0;
        height: 40px;
        display: flex; align-items: center;
        padding: 0 22px;
        font-size: 15px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(22px) saturate(170%);
        -webkit-backdrop-filter: blur(22px) saturate(170%);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }
      .menubar .group { display: flex; align-items: center; gap: 20px; }
      .menubar .app   { font-weight: 700; letter-spacing: -0.005em; }
      .menubar .spacer { flex: 1; }
      .menubar .right { gap: 16px; }
      .menubar .icon { display: inline-flex; color: #18201d; opacity: 0.85; }
      .menubar .icon svg { display: block; }
      .menubar .clock {
        font-variant-numeric: tabular-nums;
        font-weight: 500;
      }
      .parakey-mb {
        width: 26px; height: 26px;
        border-radius: 6px;
        display: grid; place-items: center;
        color: #18201d;
      }
      .parakey-mb svg { width: 16px; height: 16px; }

      /* ---------- Editor window ---------- */
      .editor {
        position: absolute;
        left: 50%;
        top: 110px;
        transform: translateX(-50%);
        width: 1240px;
        height: 700px;
        background: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.5) inset,
          0 0 0 1px rgba(0, 0, 0, 0.07),
          0 4px 12px rgba(0, 0, 0, 0.06),
          0 32px 80px rgba(0, 0, 0, 0.22);
      }
      .titlebar {
        height: 44px;
        background: linear-gradient(180deg, #f6f5ef 0%, #ecebe3 100%);
        border-bottom: 1px solid rgba(0, 0, 0, 0.07);
        display: flex; align-items: center;
        padding: 0 18px;
        position: relative;
      }
      .traffic { display: flex; gap: 8px; }
      .traffic span {
        width: 12px; height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.18);
      }
      .traffic .r { background: #ff5f57; }
      .traffic .y { background: #febc2e; }
      .traffic .g { background: #28c840; }
      .window-title {
        position: absolute; left: 50%; transform: translateX(-50%);
        font-size: 14px;
        color: #565550;
        font-weight: 500;
      }
      .doc {
        height: calc(100% - 44px);
        padding: 88px 110px;
        box-sizing: border-box;
        position: relative;
      }
      .doc-line {
        margin: 0;
        font-size: 50px;
        line-height: 1.4;
        color: #18201d;
        letter-spacing: -0.012em;
        font-weight: 400;
        white-space: pre-wrap;
        word-break: normal;
        overflow-wrap: break-word;
        position: relative;
      }
      .cursor {
        display: inline-block;
        width: 3px;
        height: 56px;
        background: #18201d;
        vertical-align: -14px;
        margin-left: 2px;
        border-radius: 1px;
      }

      /* ---------- Keypress visualisation.
         A single clearly-drawn keycap below the editor, sitting on the
         desktop. This visualises the user's keyboard *input*. It is
         not styled like Parakey's UI — it's a keyboard cap. Beside it
         sits a small dim narration line that walks the viewer through
         the beats, like a movie subtitle, not like an app HUD. ---------- */
      .stage {
        position: absolute;
        left: 50%;
        top: 868px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .keycap {
        width: 86px;
        height: 86px;
        border-radius: 12px;
        background: #fdfcf8;
        border: 1px solid rgba(0, 0, 0, 0.10);
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.08), 0 1px 0 rgba(255,255,255,0.6) inset;
        display: grid;
        place-items: center;
        position: relative;
        will-change: transform, box-shadow, background;
      }
      .keycap .glyph {
        font-size: 38px;
        color: #18201d;
        line-height: 1;
        font-weight: 500;
        margin-top: -10px;
      }
      .keycap .lbl {
        position: absolute;
        bottom: 9px;
        font-size: 11px;
        color: #8a948e;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .keycap.pressed {
        background: #d6efe3;
        border-color: rgba(13, 127, 95, 0.45);
        box-shadow:
          0 1px 0 rgba(0, 0, 0, 0.06),
          0 0 0 3px rgba(13, 127, 95, 0.16),
          0 0 24px rgba(16, 185, 129, 0.28);
        transform: translateY(3px);
      }
      .keycap.pressed .glyph { color: #075941; }
      .keycap.pressed .lbl   { color: #1a8a64; }

      .narration {
        font-size: 26px;
        color: var(--text-dim);
        font-weight: 500;
        letter-spacing: -0.005em;
        font-variant-numeric: tabular-nums;
        min-width: 320px;
      }
      .narration .latency {
        color: var(--accent);
        font-weight: 700;
        will-change: transform;
        display: inline-block;
      }

      /* ---------- End caption (main + lightweight subtitle) ---------- */
      .caption {
        position: absolute;
        left: 0; right: 0;
        bottom: 56px;
        text-align: center;
      }
      .caption .main,
      .caption .sub {
        will-change: opacity, transform;
      }
      .caption .main {
        font-size: 42px;
        color: #18201d;
        font-weight: 600;
        letter-spacing: -0.015em;
      }
      .caption .main .dim { color: #5d6a64; font-weight: 400; }
      .caption .sub {
        margin-top: 10px;
        font-size: 22px;
        color: #6a766f;
        font-weight: 500;
        letter-spacing: 0;
        font-variant-numeric: tabular-nums;
      }
      .caption .sub .accent { color: var(--accent); font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="menubar">
      <div class="group">
        <span class="app">TextEdit</span>
        <span>File</span>
        <span>Edit</span>
        <span>Format</span>
        <span>View</span>
        <span>Window</span>
        <span>Help</span>
      </div>
      <span class="spacer"></span>
      <div class="group right">
        <span class="icon" aria-hidden="true">
          <svg width="26" height="13" viewBox="0 0 28 14" fill="none">
            <rect x="0.7" y="0.7" width="22.6" height="12.6" rx="2.6" stroke="currentColor" stroke-width="1.1"/>
            <rect x="2.4" y="2.4" width="15.5" height="9.2" rx="1.2" fill="currentColor"/>
            <rect x="24" y="4.6" width="1.6" height="4.8" rx="0.7" fill="currentColor"/>
          </svg>
        </span>
        <span class="icon" aria-hidden="true">
          <svg width="20" height="16" viewBox="0 0 22 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
            <path d="M2 6 Q11 -2 20 6"/>
            <path d="M5 9.5 Q11 4 17 9.5"/>
            <path d="M8 13 Q11 10.5 14 13"/>
            <circle cx="11" cy="16" r="1.2" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <span class="parakey-mb" aria-hidden="true">
          <svg viewBox="0 0 100 100" fill="currentColor">
            <rect x="35" y="10" width="30" height="55" rx="15"/>
            <rect x="48.5" y="65" width="3" height="15"/>
            <rect x="22" y="80" width="56" height="6" rx="3"/>
          </svg>
        </span>
        <span class="clock">9:41</span>
      </div>
    </div>

    <div class="editor">
      <div class="titlebar">
        <div class="traffic"><span class="r"></span><span class="y"></span><span class="g"></span></div>
        <div class="window-title">Untitled.txt</div>
      </div>
      <div class="doc">
        <p class="doc-line"><span class="text" id="docText"></span><span class="cursor" id="cursor"></span></p>
      </div>
    </div>

    <div class="stage">
      <div class="keycap" id="keycap">
        <span class="glyph">⌥</span>
        <span class="lbl">option</span>
      </div>
      <div class="narration" id="narration">Hold Right Option</div>
    </div>

    <div class="caption" id="caption">
      <div class="main" id="captionMain" style="opacity:0; transform: translateY(14px);">Local on-device dictation. <span class="dim">No cloud transcription.</span></div>
      <div class="sub" id="captionSub" style="opacity:0; transform: translateY(14px);"><span class="accent">2.2 MB</span> download &middot; <span class="accent">~80 MB</span> RAM idle &middot; <span class="accent">~94 ms</span> end-to-end</div>
    </div>

    <script>
      const FULL_TEXT = "Parakey is a local push-to-talk dictation app for Apple Silicon Macs.";

      const TL = {
        keyDown:        1.0,   // user begins holding the key
        recordingEnd:   6.0,   // key released
        textAppear:     6.094, // text pastes 94 ms after release
        textRevealEnd:  6.264,
        badgePop:       6.144, // little "94 ms" annotation springs in
        badgePopEnd:    6.50,
        badgeFade:      7.80,  // badge starts fading
        badgeGone:      8.30,
        captionMainIn:  9.50,
        captionMainEnd: 9.83,
        captionSubIn:   9.66,
        captionSubEnd:  10.02,
        end:           14.0,
      };

      const docText     = document.getElementById('docText');
      const docLine     = document.querySelector('.doc-line');
      const cursor      = document.getElementById('cursor');
      const keycap      = document.getElementById('keycap');
      const narration   = document.getElementById('narration');
      const captionMain = document.getElementById('captionMain');
      const captionSub  = document.getElementById('captionSub');

      docLine.style.transformOrigin = '0% 0%';

      function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
      function easeOutQuad(p)   { return 1 - Math.pow(1 - clamp(p, 0, 1), 2); }
      function easeOutCubic(p)  { return 1 - Math.pow(1 - clamp(p, 0, 1), 3); }
      function easeOutBack(p, k) {
        p = clamp(p, 0, 1);
        const c1 = k == null ? 1.7 : k;
        const c3 = c1 + 1;
        return 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2);
      }

      function renderAt(t) {
        // Cursor blink — frozen ON briefly during the paste so the eye
        // doesn't catch a flicker right as the text lands.
        let blinkOn;
        if (t >= TL.textAppear && t < TL.textRevealEnd + 0.4) {
          blinkOn = 1;
        } else {
          blinkOn = ((t * 1.88) % 1) < 0.55 ? 1 : 0;
        }
        cursor.style.opacity = blinkOn;

        // Keycap state — depressed only while the hotkey is held.
        if (t >= TL.keyDown && t < TL.recordingEnd) {
          keycap.classList.add('pressed');
        } else {
          keycap.classList.remove('pressed');
        }

        // Narration line — three beats of plain text on the desktop,
        // no card chrome. The 94 ms claim rides in this line (in
        // brand-green, slightly bolder) instead of as an inline pill
        // inside the editor, because anything inside the editor reads
        // as something Parakey put there — and Parakey doesn't.
        if (t < TL.keyDown) {
          narration.textContent = 'Hold Right Option';
        } else if (t < TL.textAppear) {
          const elapsed = Math.min(t, TL.recordingEnd) - TL.keyDown;
          narration.textContent = 'Speaking… ' + elapsed.toFixed(1) + 's';
        } else {
          // Spring-scale the "94 ms" portion the moment the text lands,
          // so the eye snaps from the editor to the proof.
          let badgeScale = 1;
          if (t < TL.badgePop) {
            badgeScale = 0.6;
          } else if (t < TL.badgePopEnd) {
            const p = (t - TL.badgePop) / (TL.badgePopEnd - TL.badgePop);
            badgeScale = easeOutBack(p, 2.2);
          }
          narration.innerHTML =
            'Pasted in <span class="latency" style="transform: scale(' + badgeScale + ')">94 ms</span>';
        }

        // Pasted text snap-in (scale applied to the parent paragraph so
        // the inline cursor + badge flow correctly).
        if (t >= TL.textAppear) {
          docText.textContent = FULL_TEXT;
          const p = clamp((t - TL.textAppear) / (TL.textRevealEnd - TL.textAppear), 0, 1);
          const eased = easeOutQuad(p);
          docText.style.opacity = eased;
          docLine.style.transform = 'scale(' + (0.985 + 0.015 * eased) + ')';
        } else {
          docText.textContent = '';
          docText.style.opacity = 0;
          docLine.style.transform = 'scale(1)';
        }

        // Caption — main + subtitle slide up + fade, staggered.
        function captionReveal(el, start, end) {
          let p;
          if      (t < start) p = 0;
          else if (t < end)   p = easeOutCubic((t - start) / (end - start));
          else                p = 1;
          el.style.opacity = p;
          el.style.transform = 'translateY(' + ((1 - p) * 14) + 'px)';
        }
        captionReveal(captionMain, TL.captionMainIn, TL.captionMainEnd);
        captionReveal(captionSub,  TL.captionSubIn,  TL.captionSubEnd);
      }

      renderAt(0);
      window.renderAt = renderAt;
      window.demoReady = true;
    </script>
  </body>
</html>
