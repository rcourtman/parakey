name: Bug report
description: Something doesn't work as expected.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 26.4.1 (Tahoe)
    validations:
      required: true
  - type: input
    id: mac
    attributes:
      label: Mac model
      placeholder: e.g. Mac mini M2, MacBook Pro M3 Pro
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Log output
      description: |
        Last ~30 lines of `~/Library/Logs/Parakey.log` (same path for
        the Homebrew Cask install and a contributor `dev-run.sh` build
        — they share a bundle id).

        Parakey never logs transcript content; if you've manually
        patched a debug build to do so, redact it before pasting.
      render: shell
  - type: checkboxes
    id: permissions
    attributes:
      label: Permissions granted to Parakey.app
      description: All three are required.
      options:
        - label: Microphone
        - label: Accessibility
        - label: Input Monitoring
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
