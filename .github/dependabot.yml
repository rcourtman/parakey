# Surface advisories against the single Swift dependency (FluidAudio)
# and the GitHub Actions used in .github/workflows/. Updates land as PRs
# rather than auto-merging — the maintainer reviews each one before
# bumping the pin.
version: 2
updates:
  - package-ecosystem: swift
    directory: /swift
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
