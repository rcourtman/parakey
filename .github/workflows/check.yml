name: check

# Lightweight repo-hygiene checks: shell + XML/plist syntax. Building the
# Swift app needs macOS 26 (LSMinimumSystemVersion in swift/Info.plist) and
# downloads the FluidAudio CoreML weights (~600 MB) on first build, so the
# actual build/notarise path lives in ship-swift.sh on the maintainer's Mac.
# Linux runners just cheap-check that the things humans hand-edit are still
# parseable.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax
        run: |
          bash -n ship-swift.sh
          bash -n swift/dev-run.sh
          bash -n icon/make-icons.sh
      - name: Plist + XML syntax
        run: |
          python3 -c "import xml.etree.ElementTree as ET; \
            ET.parse('swift/Info.plist'); \
            ET.parse('entitlements.plist'); \
            ET.parse('docs/sitemap.xml')"
      - name: Docs syntax
        run: |
          python3 -m json.tool docs/benchmarks/results.json >/dev/null
          python3 -m json.tool docs/privacy/network-calls.json >/dev/null
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          for path in sorted(Path("docs").rglob("*.html")):
              text = path.read_text(encoding="utf-8")
              parser = Parser()
              parser.feed(text)
              if "<title>" not in text or "</main>" not in text:
                  raise SystemExit(f"{path}: missing title or main")
          PY
