name: check

# Lightweight macOS repo-hygiene checks plus pure DEBUG self-tests.
# The Swift self-test lane is pure DEBUG logic; the full build/notarise path
# still lives in ship-swift.sh on the maintainer's Mac.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Swift self-tests
        working-directory: swift
        run: swift run -c debug Parakey --self-test all
      - name: Shell syntax
        run: |
          bash -n ship-swift.sh
          bash -n swift/dev-run.sh
          bash -n icon/make-icons.sh
          bash -n experiments/swift-bench/generate-test-audio.sh
      - name: Plist + XML syntax
        run: |
          plutil -lint swift/Info.plist entitlements.plist
          python3 - <<'PY'
          import glob
          import xml.etree.ElementTree as ET

          for path in [
              "swift/Info.plist",
              "entitlements.plist",
              "docs/sitemap.xml",
              "docs/favicon.svg",
              *sorted(glob.glob("icon/*.svg")),
          ]:
              ET.parse(path)
          PY
      - name: YAML syntax
        run: |
          git ls-files -z -- '*.yml' '*.yaml' | ruby -e '
          require "yaml"

          STDIN.read.split("\0").reject(&:empty?).each do |path|
            YAML.load_file(path)
          end
          '
      - name: Docs syntax
        run: |
          python3 -m json.tool docs/benchmarks/results.json >/dev/null
          python3 -m json.tool docs/privacy/network-calls.json >/dev/null
          python3 -m json.tool marketing/demo/package.json >/dev/null
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          for path in sorted(Path("docs").rglob("*.html")):
              text = path.read_text(encoding="utf-8")
              parser = Parser()
              parser.feed(text)
              if "<title>" not in text or "</main>" not in text:
                  raise SystemExit(f"{path}: missing title or main")
          PY
